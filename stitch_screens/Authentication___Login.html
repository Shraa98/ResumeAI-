<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | ResumeAI Pro Suite</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "on-secondary": "#452b00",
                    "on-error": "#690005",

                    "tertiary-fixed-dim": "#ffb875",
                    "on-tertiary-fixed": "#2d1600",
                    "background": "#0e1322",
                    "primary-fixed-dim": "#26dec2",
                    "outline-variant": "#3b4a46",
                    "surface-container": "#1a1f2f",

            "fontFamily": {

<style>
        body {
            background-color: #0e1322; /* Primary Background */
            color: #dee1f7; /* On Surface */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for high-density look */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0e1322; }
        ::-webkit-scrollbar-thumb { background: #2A3A4E; }
        
        .login-card {
            background-color: #1E2A3B; /* Surface */
            border: 1px solid #2A3A4E; /* Border Muted */
        }
        .input-field {
            background-color: #0e1322;
            border: 1px solid #2A3A4E;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }
        .input-field:focus {
            outline: none;
            border-color: #46f1d3;
            box-shadow: 0 0 0 1px #46f1d3;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-body-md text-body-md p-margin-mobile md:p-margin-desktop">
<!-- Auth Background Decor (Technical Minimalist Grid) -->
<div aria-hidden="true" class="fixed inset-0 pointer-events-none opacity-[0.03] overflow-hidden">
<div class="absolute inset-0" style="background-image: radial-gradient(#46f1d3 1px, transparent 1px); background-size: 40px 40px;"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-[420px]">
<!-- Branding Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-primary text-headline-md" style="font-variation-settings: 'FILL' 1;">description</span>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">ResumeAI</h1>
</div>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Pro Suite</p>
</div>
<!-- Login Card -->
<div class="login-card p-8 shadow-none">
<header class="mb-8">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-1">Welcome back, Arjun</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to your professional workspace</p>
</header>
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface-variant uppercase" for="email">Work Email</label>
<div class="relative">
<input class="input-field w-full px-4 h-10 text-on-surface font-body-sm rounded" id="email" name="email" required="" type="email" value="arjun.v@resumeai.io"/>
<span class="material-symbols-outlined absolute right-3 top-2.5 text-on-surface-variant text-[18px]">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="input-field w-full px-4 h-10 text-on-surface font-body-sm rounded" id="password" name="password" required="" type="password" value="••••••••"/>
<span class="material-symbols-outlined absolute right-3 top-2.5 text-on-surface-variant text-[18px]">lock</span>
</div>
</div>
<!-- Primary Action -->
<div class="pt-2">
<button class="w-full h-10 bg-primary text-on-primary font-label-md text-label-md uppercase tracking-wider rounded hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-grow bg-border-muted"></div>
<span class="font-label-md text-label-md text-on-surface-variant uppercase">or</span>
<div class="h-[1px] flex-grow bg-border-muted"></div>
</div>
<!-- Secondary Actions -->
<div class="space-y-3">
<button class="w-full h-10 bg-transparent border border-border-muted text-on-surface font-label-md text-label-md uppercase tracking-wider rounded hover:bg-surface-variant transition-colors flex items-center justify-center gap-3">
<svg class="w-4 h-4" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Continue with Google</span>
</button>
</div>
</div>
<!-- Footer -->
<div class="mt-8 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary hover:underline transition-all" href="#">Sign up</a>
</p>
</div>
<!-- System Stats / Technical Details -->
<div class="mt-12 flex justify-between items-center px-4">
<div class="flex gap-4 items-center">
<div class="flex items-center gap-1.5">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="font-mono-label text-mono-label text-on-surface-variant">SYSTEM_LIVE</span>
</div>
<span class="font-mono-label text-mono-label text-border-muted">|</span>
<span class="font-mono-label text-mono-label text-on-surface-variant opacity-50">v4.0.2-PR</span>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-on-surface-variant text-[16px] cursor-pointer hover:text-primary transition-colors">help</span>
<span class="material-symbols-outlined text-on-surface-variant text-[16px] cursor-pointer hover:text-primary transition-colors">settings_ethernet</span>
</div>
</div>
</main>
<!-- Visual Polish: Status Line -->
<div class="fixed bottom-0 left-0 w-full h-[2px] bg-border-muted overflow-hidden">
<div class="h-full bg-primary w-0 transition-all duration-1000 ease-in-out" id="progress-line"></div>
</div>
<script>
        // Micro-interaction for the progress line at the bottom
        window.addEventListener('load', () => {
            const line = document.getElementById('progress-line');
            line.style.width = '100%';
            setTimeout(() => {
                line.style.opacity = '0.3';
            }, 1000);
        });

        // Add focus effects to input parents if desired
        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.previousElementSibling?.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.previousElementSibling?.classList.remove('text-primary');
            });
        });
    </script>
</body></html>
